name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"

      - uses: julia-actions/cache@v3

      - name: Checkout tensor4all-rs backend
        run: |
          git clone https://github.com/tensor4all/tensor4all-rs.git ../tensor4all-rs
          git -C ../tensor4all-rs checkout 7082baa0a56873758aec75d846f67a1b44825348

      - name: Lint @autodocs Pages coverage
        run: julia --startup-file=no scripts/check_autodocs_coverage.jl

      - name: Install package and build documentation
        env:
          TENSOR4ALL_RS_PATH: ${{ github.workspace }}/../tensor4all-rs
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()
            Pkg.build("Tensor4all")
          '
          julia --project=docs docs/make.jl

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    name: Deploy documentation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

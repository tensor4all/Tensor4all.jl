name: CI

on:
  push:
    branches: [main, tensor4all-rework]
  pull_request:
    branches: [main, tensor4all-rework]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version:
          - '1.10'
          - '1.11'
        os:
          - ubuntu-latest
          - macos-latest
        include:
          - os: ubuntu-latest
            julia-version: '1.10'
            coverage: true

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v2

      - name: Checkout tensor4all-rs backend
        run: |
          git clone https://github.com/tensor4all/tensor4all-rs.git ../tensor4all-rs
          git -C ../tensor4all-rs checkout d01d0ffe0d16428cae39b09a4c3c4526ba7dbd40

      # HDF5 is loaded at runtime from HDF5.jl (no system installation needed)

      - name: Build and test
        env:
          TENSOR4ALL_RS_PATH: ${{ github.workspace }}/../tensor4all-rs
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.instantiate()
            Pkg.build()
            Pkg.test()
          '

      - name: Process coverage
        if: matrix.coverage
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
